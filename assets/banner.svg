<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="odooGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Animated flow gradients -->
    <linearGradient id="flowRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="flowLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="55%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="1 0" to="-1 0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="12" fill="#f8fafc"/>
  <rect width="900" height="300" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="1">mcp-server-odoo</text>

  <!-- ==================== MCP CLIENT CARD ==================== -->
  <g transform="translate(30, 50)" filter="url(#cardShadow)">
    <rect width="170" height="200" rx="16" fill="white"/>
    <rect width="170" height="45" rx="16" fill="url(#mcpGrad)"/>
    <rect y="33" width="170" height="12" fill="url(#mcpGrad)"/>
    <!-- Chat icon -->
    <g transform="translate(65, 10)">
      <rect x="0" y="0" width="40" height="24" rx="4" fill="none" stroke="white" stroke-width="2"/>
      <path d="M 12 8 L 28 8 M 12 12 L 24 12 M 12 16 L 20 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="85" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Claude</text>
    <text x="85" y="84" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">MCP Client</text>

    <!-- Capabilities -->
    <g transform="translate(15, 100)">
      <rect width="140" height="18" rx="9" fill="#6366f1" fill-opacity="0.1"/>
      <text x="70" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#4f46e5">list_tools</text>
    </g>
    <g transform="translate(15, 124)">
      <rect width="140" height="18" rx="9" fill="#6366f1" fill-opacity="0.1"/>
      <text x="70" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#4f46e5">call_tool</text>
    </g>
    <g transform="translate(15, 148)">
      <rect width="140" height="32" rx="8" fill="#6366f1" fill-opacity="0.06"/>
      <text x="70" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="600" fill="#4f46e5">stdio transport</text>
      <text x="70" y="26" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#64748b">JSON over stdin/stdout</text>
    </g>
  </g>

  <!-- ==================== ARROWS: CLIENT → SERVER ==================== -->
  <g>
    <!-- Request arrow (right) -->
    <path d="M 210 135 L 290 135" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 210 135 L 290 135" stroke="url(#flowRight)" stroke-width="3" fill="none"/>
    <path d="M 285 130 L 295 135 L 285 140" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Response arrow (left) -->
    <path d="M 210 165 L 290 165" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 210 165 L 290 165" stroke="url(#flowLeft)" stroke-width="3" fill="none"/>
    <path d="M 215 160 L 205 165 L 215 170" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </path>
    <text x="250" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8">MCP</text>
    <!-- Particles -->
    <circle r="2.5" fill="#6366f1" opacity="0">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M 210 135 L 290 135"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#a855f7" opacity="0">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="1s" path="M 290 165 L 210 165"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- ==================== MCP SERVER CARD (Rust) ==================== -->
  <g transform="translate(300, 50)" filter="url(#cardShadow)">
    <rect width="230" height="200" rx="16" fill="white"/>
    <rect width="230" height="45" rx="16" fill="url(#rustGrad)"/>
    <rect y="33" width="230" height="12" fill="url(#rustGrad)"/>
    <!-- Gear icon -->
    <g transform="translate(95, 10)">
      <circle cx="20" cy="12" r="6" fill="none" stroke="white" stroke-width="2"/>
      <path d="M 20 2 L 20 5 M 20 19 L 20 22 M 10 12 L 13 12 M 27 12 L 30 12 M 13 5 L 15 7 M 25 17 L 27 19 M 13 19 L 15 17 M 25 7 L 27 5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="115" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#1e293b">mcp-server-odoo</text>
    <text x="115" y="84" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">Rust / rmcp</text>

    <!-- Tools grid -->
    <g transform="translate(12, 96)">
      <rect width="98" height="18" rx="9" fill="#10b981" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#059669">list_models</text>
    </g>
    <g transform="translate(120, 96)">
      <rect width="98" height="18" rx="9" fill="#10b981" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#059669">describe_model</text>
    </g>
    <g transform="translate(12, 120)">
      <rect width="98" height="18" rx="9" fill="#10b981" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#059669">search</text>
    </g>
    <g transform="translate(120, 120)">
      <rect width="98" height="18" rx="9" fill="#10b981" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#059669">read</text>
    </g>
    <g transform="translate(12, 144)">
      <rect width="64" height="18" rx="9" fill="#f59e0b" fill-opacity="0.1"/>
      <text x="32" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#d97706">create</text>
    </g>
    <g transform="translate(84, 144)">
      <rect width="52" height="18" rx="9" fill="#f59e0b" fill-opacity="0.1"/>
      <text x="26" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#d97706">write</text>
    </g>
    <g transform="translate(144, 144)">
      <rect width="58" height="18" rx="9" fill="#ef4444" fill-opacity="0.1"/>
      <text x="29" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#dc2626">delete</text>
    </g>
    <g transform="translate(12, 168)">
      <rect width="206" height="18" rx="9" fill="#a855f7" fill-opacity="0.1"/>
      <text x="103" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#7c3aed">call_method</text>
    </g>
  </g>

  <!-- ==================== ARROWS: SERVER → ODOO ==================== -->
  <g>
    <!-- Request arrow (right) -->
    <path d="M 540 135 L 620 135" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 540 135 L 620 135" stroke="url(#flowRight)" stroke-width="3" fill="none"/>
    <path d="M 615 130 L 625 135 L 615 140" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- Response arrow (left) -->
    <path d="M 540 165 L 620 165" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 540 165 L 620 165" stroke="url(#flowLeft)" stroke-width="3" fill="none"/>
    <path d="M 545 160 L 535 165 L 545 170" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    </path>
    <text x="580" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8">JSON/2</text>
    <!-- Particles -->
    <circle r="2.5" fill="#6366f1" opacity="0">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s" path="M 540 135 L 620 135"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle r="2.5" fill="#a855f7" opacity="0">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.5s" path="M 620 165 L 540 165"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- ==================== ODOO CARD ==================== -->
  <g transform="translate(630, 50)" filter="url(#cardShadow)">
    <rect width="230" height="200" rx="16" fill="white"/>
    <rect width="230" height="45" rx="16" fill="url(#odooGrad)"/>
    <rect y="33" width="230" height="12" fill="url(#odooGrad)"/>
    <!-- Database icon -->
    <g transform="translate(95, 8)">
      <ellipse cx="20" cy="5" rx="14" ry="5" fill="none" stroke="white" stroke-width="2"/>
      <path d="M 6 5 L 6 19 M 34 5 L 34 19" fill="none" stroke="white" stroke-width="2"/>
      <ellipse cx="20" cy="19" rx="14" ry="5" fill="none" stroke="white" stroke-width="2"/>
    </g>
    <text x="115" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Odoo 19+</text>
    <text x="115" y="84" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">JSON/2 API</text>

    <!-- Models -->
    <g transform="translate(12, 96)">
      <rect width="98" height="18" rx="9" fill="#a855f7" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#7c3aed">res.partner</text>
    </g>
    <g transform="translate(120, 96)">
      <rect width="98" height="18" rx="9" fill="#a855f7" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#7c3aed">sale.order</text>
    </g>
    <g transform="translate(12, 120)">
      <rect width="98" height="18" rx="9" fill="#a855f7" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#7c3aed">account.move</text>
    </g>
    <g transform="translate(120, 120)">
      <rect width="98" height="18" rx="9" fill="#a855f7" fill-opacity="0.1"/>
      <text x="49" y="13" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#7c3aed">product.product</text>
    </g>
    <g transform="translate(12, 144)">
      <rect width="206" height="38" rx="8" fill="#a855f7" fill-opacity="0.06"/>
      <text x="103" y="16" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="600" fill="#7c3aed">Bearer token auth</text>
      <text x="103" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#64748b">X-Odoo-Database header</text>
    </g>
  </g>

  <!-- ==================== BOTTOM LABELS ==================== -->
  <text x="115" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8">Any MCP client</text>
  <text x="415" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8">8 tools, glob filtering, read-only mode</text>
  <text x="745" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8">Dynamic model discovery</text>
</svg>
